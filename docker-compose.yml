services:
  dev:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/app/target
      - node-modules:/app/editors/vscode/node_modules
    working_dir: /app
    stdin_open: true
    tty: true

  setup:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/app/target
      - node-modules:/app/editors/vscode/node_modules
    working_dir: /app
    command: >
      bash -c "
        echo '📦 Installing VS Code extension dependencies...' &&
        cd editors/vscode && npm install --omit=dev &&
        echo '✅ Setup complete'
      "

  test:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/app/target
    working_dir: /app
    command: >
      bash -c "
        cargo fmt --check &&
        cargo clippy -- -D warnings &&
        cargo test &&
        echo '✅ All checks passed'
      "

  build-ext:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - node-modules:/app/editors/vscode/node_modules
    working_dir: /app/editors/vscode
    command: >
      bash -c "
        npm install &&
        npx vsce package --no-dependencies &&
        echo '✅ Extension packaged: editors/vscode/oxide-lang-*.vsix'
      "

  build:
    build:
      context: .
      target: runtime

volumes:
  cargo-cache:
  target-cache:
  node-modules:
