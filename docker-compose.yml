services:
  dev:
    build:
      context: .
      target: dev
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/app/target
      - node-modules:/app/editors/vscode/node_modules
    working_dir: /app
    stdin_open: true
    tty: true

  setup:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/app/target
      - node-modules:/app/editors/vscode/node_modules
    working_dir: /app
    command: >
      bash -c "
        echo '📦 Installing VS Code extension dependencies...' &&
        cd editors/vscode && npm install --omit=dev &&
        echo '✅ Setup complete'
      "

  test:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/app/target
    working_dir: /app
    command: >
      bash -c "
        cargo fmt --check &&
        cargo clippy -- -D warnings &&
        cargo test &&
        echo '✅ All checks passed'
      "

  build-ext:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - node-modules:/app/editors/vscode/node_modules
    working_dir: /app/editors/vscode
    command: >
      bash -c "
        npm install &&
        npx vsce package --no-dependencies &&
        echo '✅ Extension packaged: editors/vscode/oxy-lang-*.vsix'
      "

  build:
    build:
      context: .
      target: runtime

  book:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
    working_dir: /app
    command: >
      bash -c "
        which mdbook || cargo install mdbook --version '^0.4' &&
        mdbook build book/ &&
        echo '✅ Book built: book/book/'
      "

  book-serve:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
    working_dir: /app
    ports:
      - "3000:3000"
    command: >
      bash -c "
        which mdbook || cargo install mdbook --version '^0.4' &&
        exec mdbook serve book/ --hostname 0.0.0.0 --port 3000
      "

volumes:
  cargo-cache:
  target-cache:
  node-modules:
