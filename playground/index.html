<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oxide Playground</title>
<style>
  :root {
    --bg: #1e1e2e;
    --surface: #2a2a3e;
    --text: #cdd6f4;
    --text-dim: #9399b2;
    --accent: #fab387;
    --green: #a6e3a1;
    --red: #f38ba8;
    --border: #45475a;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    text-align: center;
    padding: 3rem 1rem 2rem;
  }
  header h1 {
    font-size: 2.2rem;
    background: linear-gradient(135deg, #fab387, #f38ba8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
  }
  header p {
    color: var(--text-dim);
    font-size: 1.1rem;
    max-width: 560px;
    margin: 0 auto;
  }
  .links {
    margin-top: 1rem;
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .links a {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.9rem;
  }
  .links a:hover { text-decoration: underline; }
  main {
    flex: 1;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
    padding: 0 1rem 3rem;
  }
  .editor-pane {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 1rem;
    background: #232336;
    border-bottom: 1px solid var(--border);
  }
  .toolbar span { font-size: 0.85rem; color: var(--text-dim); }
  button {
    background: var(--green);
    color: #1e1e2e;
    border: none;
    padding: 0.45rem 1.2rem;
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.4; cursor: default; }
  #editor {
    height: 300px;
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
    font-size: 14px;
  }
  .output-pane {
    background: #11111b;
    border-top: 1px solid var(--border);
    padding: 0.8rem 1rem;
    min-height: 80px;
    max-height: 240px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 13px;
    white-space: pre-wrap;
    color: var(--text);
  }
  .output-pane .error { color: var(--red); }
  .status { padding: 0.4rem 1rem; font-size: 0.8rem; color: var(--text-dim); }
  footer {
    text-align: center;
    padding: 1.5rem;
    color: var(--text-dim);
    font-size: 0.8rem;
  }
</style>
</head>
<body>

<header>
  <h1>Oxide Playground</h1>
  <p>All of Rust's expressiveness, none of its fights. Try Oxide in your browser — no install, no Docker.</p>
  <div class="links">
    <a href="https://github.com/sabinbajracharya/Oxide">GitHub</a>
    <a href="https://github.com/sabinbajracharya/Oxide/blob/main/README.md">Docs</a>
    <a href="https://github.com/sabinbajracharya/Oxide/blob/main/docs/bytecode-vm.md">VM (10x faster)</a>
  </div>
</header>

<main>
  <div class="editor-pane">
    <div class="toolbar">
      <span>main.ox</span>
      <button id="runBtn" onclick="run()">Run</button>
    </div>
    <div id="editor"></div>
    <div class="status" id="status">Ready — press Run or Ctrl+Enter</div>
    <div class="output-pane" id="output"></div>
  </div>
</main>

<footer>
  Oxide is MIT licensed. Built with Rust + WebAssembly.
</footer>

<script type="module">
import { basicSetup } from "https://esm.sh/codemirror@6";
import { EditorView } from "https://esm.sh/@codemirror/view@6";
import { rust } from "https://esm.sh/@codemirror/lang-rust@6";

const defaultCode = `fn fib(n: i64) -> i64 {
    if n <= 1 { n } else { fib(n - 1) + fib(n - 2) }
}

fn main() {
    println!("fib(20) = {}", fib(20));

    let numbers = vec![1, 2, 3, 4, 5];
    let doubled = numbers.iter().map(|x| x * 2).collect::<Vec<i64>>();
    println!("doubled = {:?}", doubled);

    let name = "Oxide";
    println!("Hello from {}!", name);
}
`;

const view = new EditorView({
  doc: defaultCode,
  extensions: [basicSetup, rust()],
  parent: document.getElementById("editor"),
});

let wasmReady = false;

async function initWasm() {
  try {
    const wasm = await import("./oxide_wasm.js");
    window.runOxide = (src) => wasm.run_oxide(src);
    wasmReady = true;
    document.getElementById("status").textContent = "Ready — press Run or Ctrl+Enter";
  } catch (e) {
    document.getElementById("status").textContent = "WASM not available (build with wasm-pack first)";
    console.error(e);
  }
}

initWasm();

window.run = function () {
  const output = document.getElementById("output");
  const btn = document.getElementById("runBtn");
  const status = document.getElementById("status");

  if (!wasmReady) {
    output.innerHTML = '<span class="error">WASM module not loaded. Run wasm-pack build first.</span>';
    return;
  }

  btn.disabled = true;
  status.textContent = "Running...";
  const source = view.state.doc.toString();

  try {
    const result = window.runOxide(source);
    const lines = result.split("\n");
    const hasError = result.includes("Error:") || result.includes("error:") || result.includes("runtime error:");
    output.innerHTML = lines.map(l => hasError && (l.includes("Error:") || l.includes("error:"))
      ? `<span class="error">${escapeHtml(l)}</span>` : escapeHtml(l)).join("\n");
    status.textContent = "Done";
  } catch (e) {
    output.innerHTML = `<span class="error">${escapeHtml(e.toString())}</span>`;
    status.textContent = "Error";
  }

  btn.disabled = false;
};

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

document.addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
    e.preventDefault();
    window.run();
  }
});
</script>
</body>
</html>
