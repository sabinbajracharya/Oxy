[workspace]
members = ["crates/oxide-core", "crates/oxide-cli", "crates/oxide-lsp"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT"
repository = "https://github.com/nickel-lang/project-ferrite"

[workspace.dependencies]
oxide-core = { path = "crates/oxide-core" }
thiserror = "2"
colored = "2"
regex = "1"
ureq = "2"
rustyline = "15"
rusqlite = { version = "0.31", features = ["bundled"] }
tower-lsp = "0.20"
tokio = { version = "1", features = ["full"] }
serde_json = "1"
