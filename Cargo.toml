[workspace]
members = ["crates/ferrite-core", "crates/ferrite-cli", "crates/ferrite-lsp"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT"
repository = "https://github.com/nickel-lang/project-ferrite"

[workspace.dependencies]
ferrite-core = { path = "crates/ferrite-core" }
thiserror = "2"
ureq = "2"
tower-lsp = "0.20"
tokio = { version = "1", features = ["full"] }
serde_json = "1"
