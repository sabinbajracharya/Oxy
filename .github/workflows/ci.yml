name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.93.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-targets --all-features

  wasm-test:
    name: WASM execution test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.93.0"
          target: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Runs the IR interpreter compiled to real wasm32 in a wasm runtime.
      # The jit↔interp parity test only runs both backends on the native host
      # (where usize == i64), so it cannot catch wasm ABI/signature mismatches.
      # This job does. Release build keeps the module small enough to run.
      - name: Run wasm smoke tests
        run: |
          cd playground/wasm
          wasm-pack test --node --release

  build:
    name: Build release
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries (oxy + tug)
        run: cargo build --release --bin oxy --bin tug

      - name: Upload oxy binary
        uses: actions/upload-artifact@v4
        with:
          name: oxy-linux-x86_64
          path: target/release/oxy

      - name: Upload tug binary
        uses: actions/upload-artifact@v4
        with:
          name: tug-linux-x86_64
          path: target/release/tug

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --target runtime -t oxy:latest .

      - name: Verify Docker image
        run: docker run --rm oxy:latest --version
