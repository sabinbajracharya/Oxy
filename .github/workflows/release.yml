name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform_suffix: linux-x86_64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            platform_suffix: macos-aarch64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform_suffix: windows-x86_64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.93.0"
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release (oxy + tug)
        run: cargo build --release --target ${{ matrix.target }} --bin oxy --bin tug

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/oxy${{ matrix.ext }}" \
             "dist/oxy-${{ matrix.platform_suffix }}${{ matrix.ext }}"
          cp "target/${{ matrix.target }}/release/tug${{ matrix.ext }}" \
             "dist/tug-${{ matrix.platform_suffix }}${{ matrix.ext }}"

      - name: Upload oxy artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxy-${{ matrix.platform_suffix }}${{ matrix.ext }}
          path: dist/oxy-${{ matrix.platform_suffix }}${{ matrix.ext }}

      - name: Upload tug artifact
        uses: actions/upload-artifact@v4
        with:
          name: tug-${{ matrix.platform_suffix }}${{ matrix.ext }}
          path: dist/tug-${{ matrix.platform_suffix }}${{ matrix.ext }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
